apis:
  - aid: moesif:moesif
    name: Moesif Management API
    description: The Moesif Management API exposes the platform's full control plane for analytics, monetization,
      and governance. Capabilities include querying events, users, and companies; managing applications,
      workspaces, and dashboards; defining billing meters, product catalog entries, subscriptions, and
      balance transactions; configuring governance rules and quotas; managing cohorts, email templates,
      and metrics; and chat-style "Ask Question" analytics queries powered by GenAI.
