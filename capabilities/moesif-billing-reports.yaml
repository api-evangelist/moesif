naftiko: 1.0.0-alpha2
info:
  label: Management API — Billing Reports
  description: 'Management API — Billing Reports. 2 operations. Lead operation: Get BillingReports. Self-contained Naftiko
    capability covering one Moesif business surface.'
  tags:
  - Moesif
  - Billing Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MOESIF_API_KEY: MOESIF_API_KEY
capability:
  consumes:
  - type: http
    namespace: moesif-billing-reports
    baseUri: https://api.moesif.com/v1
    description: Management API — Billing Reports business capability. Self-contained, no shared references.
    resources:
    - name: ~-billing-reports
      path: /~/billing/reports
      operations:
      - name: getbillingreports
        method: GET
        description: Get BillingReports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: from
          in: query
          type: string
        - name: to
          in: query
          type: string
        - name: billing_meter_id
          in: query
          type: string
        - name: company_id
          in: query
          type: string
        - name: provider
          in: query
          type: string
        - name: subscription_id
          in: query
          type: string
        - name: success
          in: query
          type: boolean
        - name: status_code
          in: query
          type: integer
        - name: error_code
          in: query
          type: string
        - name: '`type`'
          in: query
          type: string
    - name: ~-billing-reports-metrics
      path: /~/billing/reports/metrics
      operations:
      - name: getbillingreportsmetrics
        method: GET
        description: Get BillingReports' values for a given meter and time range for a single company or all companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: from
          in: query
          type: string
          required: true
        - name: to
          in: query
          type: string
          required: true
        - name: billing_meter_id
          in: query
          type: string
        - name: success
          in: query
          type: boolean
        - name: aggregator
          in: query
          type: string
        - name: interval
          in: query
          type: string
        - name: company_id
          in: query
          type: string
        - name: subscription_id
          in: query
          type: string
        - name: '`type`'
          in: query
          type: array
    authentication:
      type: bearer
      token: '{{env.MOESIF_API_KEY}}'
  exposes:
  - type: rest
    namespace: moesif-billing-reports-rest
    port: 8080
    description: REST adapter for Management API — Billing Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1//billing/reports
      name: billing-reports
      description: REST surface for ~-billing-reports.
      operations:
      - method: GET
        name: getbillingreports
        description: Get BillingReports
        call: moesif-billing-reports.getbillingreports
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          from: rest.from
          to: rest.to
          billing_meter_id: rest.billing_meter_id
          company_id: rest.company_id
          provider: rest.provider
          subscription_id: rest.subscription_id
          success: rest.success
          status_code: rest.status_code
          error_code: rest.error_code
          '`type`': rest.`type`
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1//billing/reports/metrics
      name: billing-reports-metrics
      description: REST surface for ~-billing-reports-metrics.
      operations:
      - method: GET
        name: getbillingreportsmetrics
        description: Get BillingReports' values for a given meter and time range for a single company or all companies
        call: moesif-billing-reports.getbillingreportsmetrics
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          from: rest.from
          to: rest.to
          billing_meter_id: rest.billing_meter_id
          success: rest.success
          aggregator: rest.aggregator
          interval: rest.interval
          company_id: rest.company_id
          subscription_id: rest.subscription_id
          '`type`': rest.`type`
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: moesif-billing-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Management API — Billing Reports. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-billingreports
      description: Get BillingReports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moesif-billing-reports.getbillingreports
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        from: tools.from
        to: tools.to
        billing_meter_id: tools.billing_meter_id
        company_id: tools.company_id
        provider: tools.provider
        subscription_id: tools.subscription_id
        success: tools.success
        status_code: tools.status_code
        error_code: tools.error_code
        '`type`': tools.`type`
      outputParameters:
      - type: object
        mapping: $.
    - name: get-billingreports-values-given-meter
      description: Get BillingReports' values for a given meter and time range for a single company or all companies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moesif-billing-reports.getbillingreportsmetrics
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        from: tools.from
        to: tools.to
        billing_meter_id: tools.billing_meter_id
        success: tools.success
        aggregator: tools.aggregator
        interval: tools.interval
        company_id: tools.company_id
        subscription_id: tools.subscription_id
        '`type`': tools.`type`
      outputParameters:
      - type: object
        mapping: $.
