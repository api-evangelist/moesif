        description: Get a Company
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecompany
        method: DELETE
        description: Delete a Company
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
        - name: delete_events
          in: query
          type: boolean
          description: Delete events associated with the company which can be set to true or false(default)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-companies-id-subscriptions
      path: /search/~/companies/{id}/subscriptions
