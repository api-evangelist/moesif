naftiko: 1.0.0-alpha2
info:
  label: Management API
  description: Management API to query data in Moesif. You can use the management API to export data for custom reports or
    to build custom dashboards.
  tags:
  - Moesif
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: moesif
    baseUri: https://api.moesif.com/v1
    description: Management API HTTP API.
    authentication:
      type: bearer
      token: '{{MOESIF_TOKEN}}'
    resources:
    - name: search-companies
      path: /search/~/companies
      operations:
      - name: updatecompanies
        method: POST
        description: Update a Company
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-companies-batch
      path: /search/~/companies/batch
      operations:
