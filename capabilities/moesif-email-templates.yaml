      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moesif-email-templates.getemailtemplates
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        cohort_id: tools.cohort_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-email-template
      description: Update an Email Template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: moesif-email-templates.updateemailtemplate
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-email-template
      description: Get Email Template
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moesif-email-templates.getemailtemplate
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-email-template
      description: Delete Email Template
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: moesif-email-templates.deleteemailtemplate
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
