    baseUri: https://api.moesif.com/v1
    description: Management API — Email Templates business capability. Self-contained, no shared references.
    resources:
    - name: ~-emails-templates
      path: /~/emails/templates
      operations:
      - name: createemailtemplate
        method: POST
        description: Create New Email Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getemailtemplates
        method: GET
        description: Get Email Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: cohort_id
          in: query
          type: string
    - name: ~-emails-templates-id
      path: /~/emails/templates/{id}
      operations:
      - name: updateemailtemplate
        method: POST
        description: Update an Email Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getemailtemplate
        method: GET
        description: Get Email Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
      - name: deleteemailtemplate
        method: DELETE
        description: Delete Email Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.MOESIF_API_KEY}}'
  exposes:
  - type: rest
    namespace: moesif-email-templates-rest
    port: 8080
    description: REST adapter for Management API — Email Templates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1//emails/templates
      name: emails-templates
      description: REST surface for ~-emails-templates.
      operations:
      - method: POST
        name: createemailtemplate
        description: Create New Email Template
        call: moesif-email-templates.createemailtemplate
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getemailtemplates
        description: Get Email Templates
        call: moesif-email-templates.getemailtemplates
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          cohort_id: rest.cohort_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1//emails/templates/{id}
