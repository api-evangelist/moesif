      description: REST surface for ~-emails-templates-id.
      operations:
      - method: POST
        name: updateemailtemplate
        description: Update an Email Template
        call: moesif-email-templates.updateemailtemplate
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getemailtemplate
        description: Get Email Template
        call: moesif-email-templates.getemailtemplate
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteemailtemplate
        description: Delete Email Template
        call: moesif-email-templates.deleteemailtemplate
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
