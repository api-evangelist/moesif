naftiko: 1.0.0-alpha2
info:
  label: Management API — Subscriptions
  description: 'Management API — Subscriptions. 4 operations. Lead operation: Get the Subscriptions of a Company. Self-contained
    Naftiko capability covering one Moesif business surface.'
  tags:
  - Moesif
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MOESIF_API_KEY: MOESIF_API_KEY
capability:
  consumes:
  - type: http
    namespace: moesif-subscriptions
    baseUri: https://api.moesif.com/v1
    description: Management API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: search-~-companies-id-subscriptions
      path: /search/~/companies/{id}/subscriptions
      operations:
      - name: getcompanysubscriptions
        method: GET
        description: Get the Subscriptions of a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
    - name: search-~-subscriptions
      path: /search/~/subscriptions
      operations:
      - name: createsubscription
        method: POST
        description: Create or Update a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: search-~-subscriptions-batch
      path: /search/~/subscriptions/batch
      operations:
      - name: batchcreatesubscriptions
        method: POST
        description: Create or Update Subscriptions in Batch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: search-~-subscriptions-id
      path: /search/~/subscriptions/{id}
      operations:
      - name: getsubscription
        method: GET
        description: Get a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: app_id
          in: query
          type: string
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.MOESIF_API_KEY}}'
  exposes:
  - type: rest
    namespace: moesif-subscriptions-rest
    port: 8080
    description: REST adapter for Management API — Subscriptions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/search//companies/{id}/subscriptions
      name: search-companies-id-subscriptions
      description: REST surface for search-~-companies-id-subscriptions.
      operations:
      - method: GET
        name: getcompanysubscriptions
        description: Get the Subscriptions of a Company
        call: moesif-subscriptions.getcompanysubscriptions
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search//subscriptions
      name: search-subscriptions
      description: REST surface for search-~-subscriptions.
      operations:
      - method: POST
        name: createsubscription
        description: Create or Update a Subscription
        call: moesif-subscriptions.createsubscription
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search//subscriptions/batch
      name: search-subscriptions-batch
      description: REST surface for search-~-subscriptions-batch.
      operations:
      - method: POST
        name: batchcreatesubscriptions
        description: Create or Update Subscriptions in Batch
        call: moesif-subscriptions.batchcreatesubscriptions
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search//subscriptions/{id}
      name: search-subscriptions-id
      description: REST surface for search-~-subscriptions-id.
      operations:
      - method: GET
        name: getsubscription
        description: Get a Subscription
        call: moesif-subscriptions.getsubscription
        with:
          orgId: rest.orgId
          app_id: rest.app_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: moesif-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Management API — Subscriptions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-subscriptions-company
      description: Get the Subscriptions of a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moesif-subscriptions.getcompanysubscriptions
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-subscription
      description: Create or Update a Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: moesif-subscriptions.createsubscription
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-subscriptions-batch
      description: Create or Update Subscriptions in Batch
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: moesif-subscriptions.batchcreatesubscriptions
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-subscription
      description: Get a Subscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moesif-subscriptions.getsubscription
      with:
        orgId: tools.orgId
        app_id: tools.app_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
